name: Telegram News Digest

on:
  schedule:
    # Every 5 min, 8am-10pm MYT (0:00-14:59 UTC) — retries until sent
    - cron: '*/5 0-14 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION_GHA }}
        run: python read_telegram.py
