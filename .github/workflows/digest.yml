name: Telegram News Digest

on:
  schedule:
    # 8am MYT (UTC+8) = 0:05 UTC — overnight digest (10pm-8am)
    - cron: '5 0 * * *'
    # 9am-10pm MYT hourly = 1:05-14:05 UTC
    - cron: '5 1-14 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION_GHA }}
        run: python read_telegram.py
